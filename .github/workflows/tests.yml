name: Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-json:
    name: Validate JSON Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate locale JSON files
        run: |
          echo "Validating locale files..."
          failed=0
          for f in Assets/Resources/Locales/*.json; do
            if python3 -c "import json,sys; json.load(open('$f'))" 2>&1; then
              echo "  OK: $f"
            else
              echo "  FAIL: $f"
              failed=1
            fi
          done
          if [ $failed -ne 0 ]; then
            echo "One or more locale files contain invalid JSON."
            exit 1
          fi
          echo "All locale files are valid JSON."

      - name: Validate locale keys consistency
        id: locale-keys
        run: |
          python3 << 'PYEOF' | tee /tmp/locale-report.txt
          import json, os, sys

          locale_dir = "Assets/Resources/Locales"
          files = [f for f in os.listdir(locale_dir) if f.endswith(".json")]
          if not files:
              print("No locale files found — skipping key consistency check.")
              sys.exit(0)

          reference_file = "en.json"
          ref_path = os.path.join(locale_dir, reference_file)
          if not os.path.exists(ref_path):
              print(f"Reference locale '{reference_file}' not found — skipping check.")
              sys.exit(0)

          with open(ref_path) as f:
              ref_keys = set(json.load(f).keys())

          failed      = False
          report_lines = ["## Locale Key Consistency Report", ""]

          for filename in sorted(files):
              if filename == reference_file:
                  continue
              path = os.path.join(locale_dir, filename)
              with open(path) as f:
                  keys = set(json.load(f).keys())
              missing = sorted(ref_keys - keys)
              extra   = sorted(keys - ref_keys)
              if missing or extra:
                  report_lines.append(f"### `{filename}`")
              if missing:
                  failed = True
                  report_lines.append(f"**Missing keys ({len(missing)}):**")
                  for k in missing:
                      report_lines.append(f"- `{k}`")
              if extra:
                  report_lines.append(f"**Extra keys ({len(extra)}) — warning only:**")
                  for k in extra:
                      report_lines.append(f"- `{k}`")
              if missing or extra:
                  report_lines.append("")

          if failed:
              report_lines.insert(2, "> **Check failed** — one or more locale files are missing keys from `en.json`.")
              print("\n".join(report_lines))
              sys.exit(1)
          else:
              report_lines.append(":white_check_mark: All locale files match `en.json` key set.")
              print("\n".join(report_lines))
          PYEOF

      - name: Write locale report to GitHub Step Summary
        if: always()
        run: |
          if [ -f /tmp/locale-report.txt ]; then
            cat /tmp/locale-report.txt >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post locale report as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '/tmp/locale-report.txt';
            if (!fs.existsSync(reportPath)) return;
            const body = fs.readFileSync(reportPath, 'utf8');
            if (!body.trim()) return;
            const marker = '<!-- locale-key-report -->';
            const fullBody = `${marker}\n${body}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body:       fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body:         fullBody,
              });
            }

  test:
    name: Run EditMode Tests
    runs-on: ubuntu-latest
    needs: validate-json
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Run Unity Tests (EditMode)
        uses: game-ci/unity-test-runner@v4
        with:
          projectPath: .
          unityVersion: 6000.0.47f1
          testMode: EditMode
          artifactsPath: test-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+EndlessEngine.*'

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test Results
          path: test-results
          retention-days: 30

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Coverage Report
          path: CodeCoverage
          retention-days: 30

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: validate-json
    # Benchmarks run on push to main only — not on every PR to save CI minutes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-bench-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-bench-
            Library-

      - name: Run Performance Benchmarks (PlayMode)
        uses: game-ci/unity-test-runner@v4
        with:
          projectPath: .
          unityVersion: 6000.0.47f1
          testMode: PlayMode
          customParameters: -testFilter EndlessEngine.Tests.Performance
          artifactsPath: benchmark-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Benchmark Results
          path: benchmark-results
          retention-days: 90
